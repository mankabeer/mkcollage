<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>MK Collage</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#0f0f0f;
overflow:hidden;
height:100vh;
font-family:sans-serif;
}

.wrapper{
position:relative;
width:100vw;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
}

.collage{
position:relative;
width:min(92vw,1400px);
border-radius:24px;
box-shadow:0 30px 80px rgba(0,0,0,.45);
will-change:transform;
transition:transform .4s ease;
}

.glow{
position:absolute;
width:500px;
height:500px;
border-radius:50%;
background:radial-gradient(circle, rgba(255,255,255,.12), transparent 60%);
pointer-events:none;
mix-blend-mode:screen;
transform:translate(-50%,-50%);
}

.grain{
position:absolute;
inset:0;
pointer-events:none;
opacity:.06;
background-image:url('https://grainy-gradients.vercel.app/noise.svg');
}

.caption{
position:absolute;
bottom:30px;
left:40px;
color:white;
font-size:12px;
letter-spacing:.12em;
text-transform:uppercase;
opacity:.65;
}
</style>
</head>
<body>

<div class="wrapper">

<div class="glow" id="glow"></div>

<img
id="collage"
class="collage"
src="collage.png"
alt="collage"
/>

<div class="grain"></div>

<div class="caption">
move your cursor · click to zoom
</div>

</div>

<script>
const collage = document.getElementById('collage');
const glow = document.getElementById('glow');

let zoomed = false;

window.addEventListener('mousemove', e => {
const x = e.clientX / window.innerWidth;
const y = e.clientY / window.innerHeight;

const moveX = (x - 0.5) * 20;
const moveY = (y - 0.5) * 20;

collage.style.transform =
`translate(${moveX}px, ${moveY}px) scale(${zoomed ? 1.18 : 1})`;

glow.style.left = `${e.clientX}px`;
glow.style.top = `${e.clientY}px`;
});

collage.addEventListener('click', () => {
zoomed = !zoomed;

collage.style.transform =
zoomed
? 'scale(1.18)'
: 'scale(1)';
});

setInterval(() => {
collage.animate([
{ transform:'translateY(0px)' },
{ transform:'translateY(-8px)' },
{ transform:'translateY(0px)' }
],{
duration:6000,
iterations:Infinity
});
},1000);
</script>

</body>
</html>
